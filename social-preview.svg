    <!-- Main diamond facet - centre -->
    <polygon points="290,200 370,290 290,400 210,290" fill="url(#amber)" opacity="0.95"/>
    <!-- Top-left facet -->
    <polygon points="290,200 210,290 200,240" fill="url(#amberDark)" opacity="0.9"/>
    <!-- Top-right facet -->
    <polygon points="290,200 370,290 380,240" fill="url(#amberLight)" opacity="0.9"/>
    <!-- Bottom-left facet -->
    <polygon points="210,290 290,400 200,360" fill="url(#amberDark)" opacity="0.85"/>
    <!-- Bottom-right facet -->
    <polygon points="370,290 290,400 380,360" fill="url(#amber)" opacity="0.85"/>
    <!-- Internal facet lines -->
