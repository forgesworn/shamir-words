        font-size="52" font-weight="bold" fill="#f8fafc">shamir-words</text>

  <!-- Tagline -->
  <text x="660" y="350" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif"
        font-size="18" fill="#94a3b8">split secrets into speakable words.</text>

  <!-- Keyword ticker -->
  <text x="40" y="622" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Menlo', monospace"
        font-size="12" fill="#94a3b8" opacity="0.06"
        letter-spacing="6">SHAMIR  SECRET-SHARING  BIP39  MNEMONIC  THRESHOLD  GF256  CRYPTOGRAPHY  KEY-BACKUP  SOCIAL-RECOVERY  TYPESCRIPT  POLYNOMIAL  LAGRANGE  CHECKSUM</text>

